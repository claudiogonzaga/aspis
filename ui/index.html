<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aspis</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg-secondary: #6b6b6b;
    --fg-tertiary: #9a9a9a;
    --border: rgba(0, 0, 0, 0.10);
    --hover: rgba(0, 0, 0, 0.025);
    --score: #8a8a8a;
    --btn-border: rgba(0, 0, 0, 0.18);
    --btn-hover: rgba(0, 0, 0, 0.04);

    --pill-invest-bg: #EEEDFE;
    --pill-invest-fg: #3C3489;
    --pill-saude-bg: #E1F5EE;
    --pill-saude-fg: #085041;
    --pill-pat-bg: #FAECE7;
    --pill-pat-fg: #712B13;

    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161616;
      --fg: #ededed;
      --fg-secondary: #9c9c9c;
      --fg-tertiary: #6e6e6e;
      --border: rgba(255, 255, 255, 0.10);
      --hover: rgba(255, 255, 255, 0.03);
      --score: #7e7e7e;
      --btn-border: rgba(255, 255, 255, 0.18);
      --btn-hover: rgba(255, 255, 255, 0.05);
      /* pills keep light bg + dark text per spec; legible enough on dark */
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 680px; margin: 0 auto; padding: 28px 24px 64px; }

  header { margin-bottom: 22px; }
  .wordmark { font-size: 15px; font-weight: 500; letter-spacing: 0.01em; }
  .meta { margin-top: 3px; font-size: 12.5px; color: var(--fg-secondary); }
  .meta .dot { margin: 0 6px; color: var(--fg-tertiary); }

  .chips { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
  .chip {
    font-size: 12.5px; font-weight: 400;
    padding: 4px 11px; border-radius: 999px;
    border: 0.5px solid var(--border);
    color: var(--fg-secondary); background: transparent;
    cursor: pointer; user-select: none;
  }
  .chip:hover { background: var(--hover); }
  .chip.active { color: var(--fg); border-color: var(--btn-border); font-weight: 500; }

  .list { margin-top: 8px; }
  .row {
    display: grid; grid-template-columns: 58px 1fr; column-gap: 14px;
    padding: 16px 4px; border-top: 0.5px solid var(--border);
    cursor: pointer;
  }
  .list .row:last-child { border-bottom: 0.5px solid var(--border); }
  .row:hover { background: var(--hover); }
  .score {
    text-align: right; padding-top: 3px;
  }
  .stars { font-size: 11px; letter-spacing: 1px; color: #d8a13a; white-space: nowrap; }
  .stars .star-off { color: var(--border); }
  .period-seg { display: inline-flex; gap: 2px; }
  .seg-btn {
    font-family: var(--sans); font-size: 12px; color: var(--fg-tertiary);
    background: none; border: none; cursor: pointer; padding: 1px 6px; border-radius: 6px;
  }
  .seg-btn:hover { color: var(--fg-secondary); }
  .seg-btn.active { color: var(--fg); font-weight: 600; background: var(--hover); }
  .title { font-size: 16px; font-weight: 500; line-height: 1.35; }
  .subline {
    margin-top: 5px; font-size: 12.5px; color: var(--fg-secondary);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .pill {
    font-size: 11px; font-weight: 500; padding: 1.5px 8px; border-radius: 999px;
  }
  .pill.investimento { background: var(--pill-invest-bg); color: var(--pill-invest-fg); }
  .pill.saude       { background: var(--pill-saude-bg);  color: var(--pill-saude-fg); }
  .pill.paternidade { background: var(--pill-pat-bg);    color: var(--pill-pat-fg); }
  .pill.nenhum      { background: transparent; color: var(--fg-tertiary); border: 0.5px solid var(--border); }
  .clickbait-flag { font-size: 11px; color: var(--fg-tertiary); }

  /* Expanded synthesis */
  .synth {
    grid-column: 1 / -1; margin-top: 14px; padding-left: 0;
  }
  .resumo { font-size: 14px; color: var(--fg); margin-bottom: 14px; }
  .points { list-style: none; margin-bottom: 14px; }
  .points li {
    font-size: 13.5px; color: var(--fg); padding-left: 16px; position: relative;
    margin-bottom: 5px; line-height: 1.4;
  }
  .points li::before {
    content: "–"; position: absolute; left: 0; color: var(--fg-tertiary);
  }
  .synth-meta { font-size: 12px; color: var(--fg-secondary); margin-bottom: 14px; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .btn {
    font-family: var(--sans); font-size: 12.5px; color: var(--fg);
    padding: 5px 12px; border-radius: 7px;
    border: 0.5px solid var(--btn-border); background: transparent;
    cursor: pointer; user-select: none;
  }
  .btn:hover { background: var(--btn-hover); }
  .btn.done { color: var(--fg-secondary); border-color: var(--border); }
  .reveal {
    font-size: 12px; color: var(--fg-tertiary); background: none; border: none;
    cursor: pointer; padding: 5px 4px; margin-left: auto;
  }
  .reveal:hover { color: var(--fg-secondary); text-decoration: underline; }
  .original-title {
    margin-top: 10px; font-size: 12.5px; color: var(--fg-secondary);
    font-style: italic;
  }
  .original-title.hidden { display: none; }
  .hint { margin-top: 8px; font-size: 11px; color: var(--fg-tertiary); }

  /* Explorar (Q&A por vídeo) */
  .explore { margin-top: 18px; padding-top: 14px; border-top: 0.5px solid var(--border); }
  .explore-title { font-size: 12.5px; font-weight: 600; color: var(--fg); margin-bottom: 10px; }
  .qa-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
  .qa { font-size: 13px; }
  .qa-q { font-weight: 600; color: var(--fg); margin-bottom: 4px; }
  .qa-q::before { content: "▸ "; color: var(--fg-tertiary); }
  .qa-a { color: var(--fg-secondary); line-height: 1.5; padding-left: 14px; border-left: 2px solid var(--border); }
  .qa-a.thinking { font-style: italic; color: var(--fg-tertiary); }
  .qa-a p { margin: 0 0 8px 0; }
  .qa-a p:last-child { margin-bottom: 0; }
  .qa-a strong { color: var(--fg); font-weight: 600; }
  .qa-a code { font-family: var(--mono); font-size: 12px; background: var(--hover); padding: 1px 4px; border-radius: 4px; }
  /* a área de exploração e a síntese devem permitir seleção/cópia de texto */
  .explore, .explore *, .synth .resumo, .points, .qa-q, .qa-a { user-select: text; -webkit-user-select: text; cursor: auto; }
  .ask-row { display: flex; gap: 8px; align-items: center; }
  .ask-input {
    flex: 1 1 auto; min-width: 0; font-family: var(--sans); font-size: 13px;
    border: 0.5px solid var(--btn-border); border-radius: 8px; padding: 8px 11px;
    background: transparent; color: var(--fg);
  }
  .ask-input:disabled { opacity: 0.6; }
  .ask-btn { white-space: nowrap; }
  .explore-hint { margin-top: 8px; font-size: 11px; color: var(--fg-tertiary); }

  footer {
    margin-top: 36px; padding-top: 16px; border-top: 0.5px solid var(--border);
    font-size: 12.5px; color: var(--fg-tertiary); text-align: center;
  }
  .empty { padding: 48px 8px; text-align: center; color: var(--fg-tertiary); font-size: 13px; }

  /* Conta / configurações */
  .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .top-actions { display: flex; align-items: center; gap: 8px; }
  .update-pill { color: #fff; background: #c8651e; border-color: #c8651e; font-weight: 500; }
  .update-pill:hover { background: #b25718; }
  .update-pill:disabled { opacity: 0.7; }
  .acct-btn:disabled { opacity: 0.6; cursor: default; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--fg); color: var(--bg); padding: 8px 16px; border-radius: 9px;
    font-size: 12.5px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 80;
    max-width: 80%; text-align: center;
  }
  .toast.show { opacity: 0.96; }
  .acct-btn {
    font-family: var(--sans); font-size: 12.5px; color: var(--fg-secondary);
    background: transparent; border: 0.5px solid var(--btn-border); border-radius: 999px;
    padding: 4px 11px; cursor: pointer; display: flex; align-items: center; gap: 7px;
    max-width: 200px;
  }
  .acct-btn:hover { background: var(--btn-hover); }
  .acct-btn img { width: 18px; height: 18px; border-radius: 50%; }
  .acct-btn span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.32);
    display: none; align-items: flex-start; justify-content: center; z-index: 50;
  }
  .overlay.show { display: flex; }
  .panel {
    background: var(--bg); color: var(--fg); margin-top: 60px; width: min(440px, 92vw);
    border-radius: 14px; border: 0.5px solid var(--border);
    box-shadow: 0 18px 60px rgba(0,0,0,0.28); padding: 22px; max-height: 80vh; overflow: auto;
  }
  .panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .panel .sub { font-size: 12.5px; color: var(--fg-secondary); margin-bottom: 16px; }
  .panel .close {
    float: right; background: none; border: none; font-size: 20px; line-height: 1;
    color: var(--fg-tertiary); cursor: pointer; margin: -4px -4px 0 0;
  }
  .panel .close:hover { color: var(--fg); }
  .chan { display: flex; align-items: center; gap: 11px; padding: 11px 0; border-top: 0.5px solid var(--border); }
  .chan:first-of-type { border-top: none; }
  .chan img, .chan .ph { width: 34px; height: 34px; border-radius: 50%; flex: 0 0 auto; background: var(--hover); }
  .chan .info { flex: 1 1 auto; min-width: 0; }
  .chan .nm { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chan .hd { font-size: 12px; color: var(--fg-secondary); }
  .active-tag { font-size: 11px; color: var(--pill-saude-fg); background: var(--pill-saude-bg); padding: 2px 9px; border-radius: 999px; }
  .lnk { font-size: 12px; color: var(--fg-tertiary); background: none; border: none; cursor: pointer; padding: 2px 4px; }
  .lnk:hover { text-decoration: underline; color: var(--fg-secondary); }
  .field {
    width: 100%; font-family: var(--mono); font-size: 11.5px;
    border: 0.5px solid var(--btn-border); border-radius: 8px; padding: 10px;
    min-height: 116px; background: transparent; color: var(--fg); resize: vertical;
  }
  .primary {
    background: var(--fg); color: var(--bg); border: none; border-radius: 8px;
    padding: 8px 16px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .primary:disabled { opacity: 0.5; cursor: default; }
  .row-actions { margin-top: 16px; display: flex; gap: 10px; align-items: center; }
  .help { font-size: 12px; color: var(--fg-secondary); margin-top: 14px; line-height: 1.55; }
  .help b { color: var(--fg); font-weight: 600; }
  .note { font-size: 12px; margin-top: 12px; line-height: 1.45; }
  .note.err { color: #d2453c; }
  .note.ok { color: var(--pill-saude-fg); }
  .onboard { padding: 44px 8px; text-align: center; color: var(--fg-secondary); font-size: 13.5px; line-height: 1.6; }
  .onboard .primary { margin-top: 16px; }

  .section { margin-top: 22px; padding-top: 18px; border-top: 0.5px solid var(--border); }
  .section:first-of-type { margin-top: 16px; }
  .sec-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .key-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
  .inp {
    flex: 1 1 auto; min-width: 0; font-family: var(--mono); font-size: 12px;
    border: 0.5px solid var(--btn-border); border-radius: 8px; padding: 8px 10px;
    background: transparent; color: var(--fg);
  }
  .obj { padding: 10px 0; border-top: 0.5px solid var(--border); }
  .obj:first-of-type { border-top: none; }
  .obj-head { display: flex; gap: 8px; align-items: center; }
  .obj-head .inp { flex: 1 1 auto; }
  .peso-sel { font-size: 12px; padding: 6px 6px; border-radius: 7px; border: 0.5px solid var(--btn-border); background: transparent; color: var(--fg); }
  .obj-desc { min-height: 56px; margin-top: 8px; }
  .wcheck { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--fg-secondary); margin-top: 10px; cursor: pointer; }
  .wcheck input { margin: 0; }
  .row.is-read .title { color: var(--fg-secondary); }
  .row.is-read .score { opacity: 0.55; }
  .chip-stars { display: inline-flex; align-items: center; gap: 5px; margin-left: auto; cursor: default; }
  .chip-stars-ic { display: inline-flex; gap: 1px; font-size: 13px; }
  .chip-stars-ic .fs { color: var(--border); cursor: pointer; transition: color .1s; }
  .chip-stars-ic .fs.on { color: #d8a13a; }
  .chip-stars-ic .fs:hover { color: #e6b04a; }
  .chip-stars-lbl { font-size: 11.5px; color: var(--fg-secondary); min-width: 3em; }
  .chip-read { /* fica logo após o de estrelas */ }
  .thr-val { font-family: var(--mono); font-size: 12px; }
  .star-row { display: flex; align-items: center; gap: 4px; margin-top: 10px; }
  .star-pick { font-size: 22px; line-height: 1; background: none; border: none; cursor: pointer; color: var(--border); padding: 0 2px; }
  .star-pick.on { color: #d8a13a; }
  .star-row .thr-val { margin-left: 8px; color: var(--fg-secondary); }
  .obj-q, .obj-n { margin-top: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="topbar">
      <div class="wordmark">Aspis</div>
      <div class="top-actions">
        <button class="acct-btn update-pill" id="app-update-btn" onclick="installUpdateFromTop()" style="display:none"></button>
        <button class="acct-btn" id="refresh-btn" onclick="doRefresh()"><span>↻ Atualizar</span></button>
        <button class="acct-btn" id="acct-btn" onclick="openSettings()"><span>Conta</span></button>
      </div>
    </div>
    <div class="meta">
      <span id="new-count">—</span>
      <span class="dot">·</span>
      <span class="period-seg" id="period-seg"></span>
    </div>
    <div class="chips" id="chips"></div>
  </header>

  <div class="list" id="list"></div>

  <footer id="footer"></footer>
</div>

<div class="overlay" id="overlay" onclick="if (event.target === this) closeSettings()">
  <div class="panel" id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  let PILLARS = [{ key: null, label: "Tudo" }];
  let pilares = [];            // [{id, nome, descricao, peso}]
  let pillMeta = {};           // id -> {label, bg, fg}
  let objDraft = [];           // cópia de edição na tela de Configurações
  const PALETTE = [
    { bg: "#EEEDFE", fg: "#3C3489" }, { bg: "#E1F5EE", fg: "#085041" },
    { bg: "#FAECE7", fg: "#712B13" }, { bg: "#E7F0FB", fg: "#1B4F8A" },
    { bg: "#FBF3E0", fg: "#7A5A12" }, { bg: "#F3E8F7", fg: "#6A2A7A" },
  ];
  function buildPillMeta() {
    PILLARS = [{ key: null, label: "Tudo" }];
    pillMeta = { nenhum: { label: "—", bg: "transparent", fg: "var(--fg-tertiary)" } };
    pilares.forEach((p, i) => {
      const c = PALETTE[i % PALETTE.length];
      PILLARS.push({ key: p.id, label: p.nome });
      pillMeta[p.id] = { label: p.nome, bg: c.bg, fg: c.fg };
    });
  }
  async function refreshPilares() {
    const a = api(); if (!a) return;
    try { pilares = await a.get_pilares(); } catch (e) { console.error("get_pilares", e); }
    buildPillMeta();
  }

  let activeFilter = null;
  let expandedId = null;
  let showRead = false;   // mostrar também os marcados como lidos
  let period = "day";     // day | week | month
  let ytStatus = { client_configured: false, channels: [], active: null };
  let geminiStatus = { configured: false, masked: "", provider: "gemini" };
  let whisperStatus = { model: "base", enabled: false, auto_on_block: true, models: [], downloaded: [] };
  let updateStatus = {};   // {checking|error|current|latest|update_available|dmg_url}
  let minStars = 3;
  let rulesText = "";

  // Bridge: pywebview injects `pywebview.api`. We wait for it.
  function api() {
    if (window.pywebview && window.pywebview.api) return window.pywebview.api;
    return null;
  }

  function fmtDate(d) {
    const opts = { weekday: "long", day: "numeric", month: "long" };
    let s = d.toLocaleDateString("pt-BR", opts);
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function renderChips() {
    const c = document.getElementById("chips");
    c.innerHTML = "";
    for (const p of PILLARS) {
      const el = document.createElement("div");
      el.className = "chip" + (activeFilter === p.key ? " active" : "");
      el.textContent = p.label;
      el.onclick = () => { activeFilter = p.key; expandedId = null; load(); };
      c.appendChild(el);
    }

    // filtro por estrelas: clique DIRETO na estrela N para exigir N★+.
    // Clicar na estrela já selecionada (a N-ésima) zera o filtro (mostra tudo).
    const sf = document.createElement("div");
    sf.className = "chip chip-stars";
    sf.title = "Filtrar por estrelas — clique na estrela desejada";
    let html = `<span class="chip-stars-ic">`;
    for (let n = 1; n <= 5; n++) {
      const cls = n <= minStars ? "fs on" : "fs";
      html += `<span class="${cls}" data-n="${n}">★</span>`;
    }
    html += `</span> <span class="chip-stars-lbl">${minStars > 0 ? minStars + "★+" : "todos"}</span>`;
    sf.innerHTML = html;
    sf.querySelectorAll(".fs").forEach(st => {
      st.onclick = async (e) => {
        e.stopPropagation();
        const n = parseInt(st.dataset.n, 10);
        minStars = (n === minStars) ? 0 : n;   // reclicar a atual = mostrar todos
        try { await api().set_min_stars(minStars); } catch (err) {}
        expandedId = null; load();
      };
    });
    c.appendChild(sf);

    // toggle para mostrar/ocultar os lidos
    const r = document.createElement("div");
    r.className = "chip chip-read" + (showRead ? " active" : "");
    r.textContent = showRead ? "Ocultar lidos" : "Mostrar lidos";
    r.onclick = () => { showRead = !showRead; expandedId = null; load(); };
    c.appendChild(r);
  }

  function renderPeriod() {
    const el = document.getElementById("period-seg");
    if (!el) return;
    const opts = [["day", "Dia"], ["week", "Semana"], ["month", "Mês"]];
    el.innerHTML = opts.map(([k, lab]) =>
      `<button class="seg-btn ${period === k ? "active" : ""}" data-p="${k}">${lab}</button>`
    ).join("");
    el.querySelectorAll("[data-p]").forEach(b => {
      b.onclick = async () => {
        period = b.dataset.p; expandedId = null;
        try { await api().set_period(period); } catch (e) {}
        load();
      };
    });
  }

  function rowHtml(v) {
    const m = pillMeta[v.pillar] || pillMeta["nenhum"];
    const pill = `<span class="pill" style="background:${m.bg};color:${m.fg}">${esc(m.label)}</span>`;
    const cb = v.is_clickbait ? `<span class="clickbait-flag">· sensacionalista</span>` : "";
    const n = v.stars || 0;
    const stars = `<span class="stars" title="${v.stars}/5">${"★".repeat(n)}<span class="star-off">${"★".repeat(5 - n)}</span></span>`;
    return `
      <div class="score">${stars}</div>
      <div>
        <div class="title">${esc(v.neutral_title)}</div>
        <div class="subline">
          <span>${esc(v.channel)}</span>
          <span class="dot" style="color:var(--fg-tertiary)">·</span>
          <span>${esc(v.duration)}</span>
          ${pill}${cb}
        </div>
        <div class="synth-host"></div>
      </div>`;
  }

  function synthHtml(v) {
    const points = (v.pontos_chave || []).map(p => `<li>${esc(p)}</li>`).join("");
    const nFatos = (v.fatos || []).length;
    const firstCite = (v.citacoes || [])[0];
    let metaBits = [];
    if (nFatos > 0) metaBits.push(`${nFatos} ${nFatos === 1 ? "fato" : "fatos"} para o Anki`);
    if (firstCite && firstCite.timestamp) metaBits.push(`trecho em ${esc(firstCite.timestamp)}`);
    const metaLine = metaBits.length ? `<div class="synth-meta">${metaBits.join(" · ")}</div>` : "";

    const b = (flag, label, labelDone, action, tip) =>
      `<button class="btn ${v[flag] ? "done" : ""}" data-action="${action}" title="${esc(tip)}">${v[flag] ? labelDone : label}</button>`;

    return `
      <div class="synth">
        <div class="resumo">${esc(v.resumo)}</div>
        ${points ? `<ul class="points">${points}</ul>` : ""}
        ${metaLine}
        <div class="actions">
          <button class="btn" data-action="watch" title="Baixa o vídeo e abre no player do seu Mac (não abre o YouTube). Fica salvo em ~/Aspis/Downloads.">Assistir</button>

  // markdown mínimo e seguro: escapa HTML primeiro, depois aplica **negrito**,
  // *itálico*, `código` e quebras de linha/parágrafo.
  function mdLite(s) {
    let t = esc(s);
    t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>");
    t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
    t = t.replace(/\n{2,}/g, "</p><p>").replace(/\n/g, "<br>");
    return "<p>" + t + "</p>";
  }

  function renderQa(videoId, items) {
    const box = document.getElementById("qa-" + videoId);
    if (!box) return;
    box.innerHTML = (items || []).map(qa => `
      <div class="qa">
        <div class="qa-q">${esc(qa.question)}</div>
        <div class="qa-a">${mdLite(qa.answer)}</div>

  async function loadQa(videoId) {
    const a = api(); if (!a) return;
    try { renderQa(videoId, await a.get_qa(videoId)); } catch (e) { console.error(e); }
  }

  async function askVideo(videoId) {
    const a = api(); if (!a) return;
    const inp = document.getElementById("ask-" + videoId);
    const q = (inp.value || "").trim();
    if (!q) return;
    const box = document.getElementById("qa-" + videoId);
    inp.disabled = true;
    // mostra a pergunta + "pensando" otimista
    box.insertAdjacentHTML("beforeend",
      `<div class="qa pending"><div class="qa-q">${esc(q)}</div><div class="qa-a thinking">Consultando a transcrição…</div></div>`);
    box.scrollTop = box.scrollHeight;
    try {
      const r = await a.ask_video(videoId, q);
      if (r && r.ok) {
        inp.value = "";
        await loadQa(videoId);   // recarrega do banco (persistido)
      } else {
        const pend = box.querySelector(".qa.pending .qa-a");
        if (pend) { pend.classList.remove("thinking"); pend.textContent = (r && r.error) || "Não foi possível responder."; }
      }
    } catch (e) {
      const pend = box.querySelector(".qa.pending .qa-a");
      if (pend) { pend.classList.remove("thinking"); pend.textContent = String(e); }
    } finally {
      inp.disabled = false; inp.focus();
    }
  }

  function wireRow(rowEl, v) {
    rowEl.onclick = (e) => {
      // ignore clicks inside the expanded synthesis
      if (e.target.closest(".synth")) return;
      expandedId = (expandedId === v.video_id) ? null : v.video_id;
      load();
    };
    if (expandedId !== v.video_id) return;

    const host = rowEl.querySelector(".synth-host");
    host.innerHTML = synthHtml(v);

    host.querySelectorAll("[data-action]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        handleAction(btn.dataset.action, v, host);
      };
    });
    // impede que cliques na área de exploração (input/chat) colapsem o card
    const ex = host.querySelector(".explore");
    if (ex) ex.onclick = (e) => e.stopPropagation();
    loadQa(v.video_id);  // carrega o histórico de perguntas salvas
  }

  async function handleAction(action, v, host) {
    const a = api();
    if (action === "reveal") {
      host.querySelector(".original-title").classList.toggle("hidden");
      return;
    }
    if (!a) { console.warn("api not ready"); return; }
    try {
      if (action === "watch") {
        const btn = host.querySelector('[data-action="watch"]');
        if (btn) { btn.textContent = "Baixando…"; btn.disabled = true; }
        flash("Baixando o vídeo para assistir no player… pode levar um pouco.", 60000);
        const r = await a.watch(v.video_id);
        if (r && r.ok) { v.downloaded = 1; flash("Abrindo no player."); }
        else { flash((r && r.error) || "Não foi possível baixar o vídeo."); }
        if (btn) { btn.textContent = "Assistir"; btn.disabled = false; }
        host.innerHTML = synthHtml(v);
        host.querySelectorAll("[data-action]").forEach(b => {
          b.onclick = (e) => { e.stopPropagation(); handleAction(b.dataset.action, v, host); };
        });
        return;
      }
      if (action === "android") {
        const btn = host.querySelector('[data-action="android"]');
        if (btn) { btn.textContent = "Enviando…"; btn.disabled = true; }
        flash("Preparando o vídeo para o Android (baixa se necessário)…", 60000);
        const r = await a.send_android(v.video_id);
        if (r && r.ok) { v.sent_android = 1; flash("✓ Copiado para ~/Aspis/ParaAndroid. Com o Syncthing ativo, aparece no celular sozinho.", 7000); }
        else { flash((r && r.error) || "Não foi possível enviar."); }
        host.innerHTML = synthHtml(v);
        host.querySelectorAll("[data-action]").forEach(b => {
          b.onclick = (e) => { e.stopPropagation(); handleAction(b.dataset.action, v, host); };
        });
        return;
      }
      if (action === "obsidian") { await a.save_obsidian(v.video_id); v.saved_obsidian = 1; }
      if (action === "anki")     { await a.save_anki(v.video_id);     v.saved_anki = 1; }
      if (action === "download") { await a.download(v.video_id);      v.downloaded = 1; }
      if (action === "read") {
        const novo = v.read ? 0 : 1;
        await a.set_read(v.video_id, novo);
        v.read = novo;
        // se marcou como lido e não estamos mostrando lidos, some da lista
        if (novo && !showRead) { expandedId = null; load(); return; }
      }
      host.innerHTML = synthHtml(v);
      host.querySelectorAll("[data-action]").forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); handleAction(btn.dataset.action, v, host); };
      });
    } catch (err) { console.error(action, err); }
  }

  let _toastTimer = null;

    const t = document.getElementById("toast");

    _toastTimer = setTimeout(() => t.classList.remove("show"), ms);

  let refreshing = false;
  async function doRefresh() {
    const a = api();
    if (!a || refreshing) return;
    refreshing = true;
    const btn = document.getElementById("refresh-btn");
    const original = btn.innerHTML;
    btn.innerHTML = "<span>Atualizando…</span>"; btn.disabled = true;
    flash("Buscando vídeos novos e sintetizando… pode levar até um minuto.", 60000);
    try {
      const r = await a.refresh();
      if (r && r.ok) {
        await load();
        flash(`Pronto · ${r.processed || 0} processado(s), ${r.above || 0} acima do limiar` +
              (r.errors ? ` · ${r.errors} com erro` : ""));
      } else {
        flash((r && r.error) || "Não foi possível atualizar.");
      }
    } catch (e) {
      flash(String(e));
    } finally {
      refreshing = false; btn.innerHTML = original; btn.disabled = false;
    }
  }

  async function installUpdate() {
    const a = api();
    const btn = document.getElementById("do-update");
    const note = document.getElementById("update-note");
    if (btn) { btn.disabled = true; btn.textContent = "Baixando e instalando…"; }
    if (note) note.textContent = "Isto pode levar alguns minutos. O app vai reabrir sozinho.";
    try {

    return `<div class="section">
      <div class="sec-title">Objetivos</div>
      <div class="sub">A IA julga cada vídeo contra estes objetivos; o peso (1–5, padrão 3) define a importância no ranqueamento. "Quero/Não quero" afinam o que conta como alinhado.</div>
      ${rows}
      <div class="row-actions">
        <button class="lnk" onclick="addObjective()">+ adicionar objetivo</button>
        <button class="primary" onclick="saveObjectives()">Salvar objetivos</button>
      </div>
      <div class="note" id="obj-note"></div>
    </div>`;
  }

  function objField(i, k, v) { if (objDraft[i]) objDraft[i][k] = v; }
  function addObjective() { objDraft.push({ id: "", nome: "", descricao: "", peso: 3, quero: "", nao_quero: "" }); renderPanel(); }
  function removeObjective(i) { objDraft.splice(i, 1); renderPanel(); }
  async function saveObjectives() {
    const a = api();
    const note = document.getElementById("obj-note");
    note.className = "note"; note.textContent = "Salvando…";
    try {
      const r = await a.save_pilares(objDraft);
      if (r && r.ok) {
        await refreshPilares();
        objDraft = pilares.map(p => ({ ...p }));
        renderPanel();
        const n2 = document.getElementById("obj-note");
        if (n2) { n2.className = "note ok"; n2.textContent = "✓ objetivos salvos. Clique ↻ Atualizar para reavaliar os vídeos."; }
        load();
      } else {
        note.className = "note err"; note.textContent = (r && r.error) || "Não foi possível salvar.";
      }
    } catch (e) { note.className = "note err"; note.textContent = String(e); }
  }

  async function saveGemini() {
    const a = api();
    const note = document.getElementById("gemini-note");
    const btn = document.getElementById("save-gemini");
    const val = document.getElementById("gemini-key").value;
    btn.disabled = true; note.className = "note"; note.textContent = "Salvando…";
    try {
      const r = await a.save_gemini_key(val);
      if (r.ok) {
        try { geminiStatus = await a.gemini_status(); } catch (e) {}
        renderPanel();
      } else {
        note.className = "note err"; note.textContent = r.error || "Não foi possível salvar.";
        btn.disabled = false;
      }
    } catch (e) { note.className = "note err"; note.textContent = String(e); btn.disabled = false; }
  }

  async function saveClient() {
    const a = api();
    const note = document.getElementById("yt-note");
    const btn = document.getElementById("save-client");
    const txt = document.getElementById("client-json").value;
    btn.disabled = true; note.className = "note"; note.textContent = "Validando…";
    try {
      const r = await a.yt_save_client(txt);
      if (r.ok) { await refreshYtStatus(); renderPanel(); }
      else { note.className = "note err"; note.textContent = r.error || "Credencial inválida."; btn.disabled = false; }
    } catch (e) { note.className = "note err"; note.textContent = String(e); btn.disabled = false; }
  }

  async function connectYt() {
    const a = api();
    const note = document.getElementById("yt-note");
    const btn = document.getElementById("connect-btn");
    if (btn) btn.disabled = true;
    if (note) { note.className = "note"; note.textContent = "Abrindo o navegador para você fazer login e escolher a conta/canal…"; }
    try {
      const r = await a.yt_connect();
      if (r.ok) { await refreshYtStatus(); renderPanel(); load(); }
      else {
        if (note) { note.className = "note err"; note.textContent = r.error || "Não foi possível conectar."; }
        if (btn) btn.disabled = false;
      }
    } catch (e) {
      if (note) { note.className = "note err"; note.textContent = String(e); }
      if (btn) btn.disabled = false;
    }
  }

  async function pickChannel(id) {
    const a = api();
    try { ytStatus = await a.yt_set_active(id); } catch (e) { console.error(e); }
    renderPanel(); renderAcctButton(); load();
  }

  async function removeChannel(id) {
    const a = api();
    try { ytStatus = await a.yt_remove(id); } catch (e) { console.error(e); }
    renderPanel(); renderAcctButton(); load();
  }

  async function resetClient() {
    const a = api();
    try { ytStatus = await a.yt_reset_client(); } catch (e) { console.error(e); }
    renderPanel(); renderAcctButton();
  }

  function renderOnboard(list) {
    list.innerHTML = `<div class="onboard">
      Para começar, conecte sua conta do YouTube.<br>
      O Aspis lê os canais que você assina e monta a lista — sem feed, sem thumbnails.
      <br><button class="primary" onclick="openSettings()">Conectar YouTube</button>
    </div>`;
  }

  async function load() {
    renderChips();
    renderPeriod();
    const a = api();
    const list = document.getElementById("list");
    if (!a) { list.innerHTML = `<div class="empty">Carregando…</div>`; return; }

    try { const vp = await a.get_view_prefs(); period = vp.period; minStars = vp.min_stars; renderPeriod(); renderChips(); } catch (e) {}
    await refreshYtStatus();
    await refreshPilares();
    if (!ytStatus.active) {
      renderOnboard(list);
      document.getElementById("new-count").textContent = "—";
      document.getElementById("footer").textContent = "";
      return;
    }

    let videos = [];
    try { videos = await a.get_videos(activeFilter, showRead); } catch (e) { console.error(e); }

    list.innerHTML = "";
    if (!videos.length) {
      list.innerHTML = `<div class="empty">${showRead ? "Nada por aqui." : "Nada por aqui — talvez tudo já esteja lido."}</div>`;
    }
    for (const v of videos) {
      const row = document.createElement("div");
      row.className = "row" + (v.read ? " is-read" : "");
      row.innerHTML = rowHtml(v);
      list.appendChild(row);
      wireRow(row, v);
    }

    // header counts
    try {
      const n = await a.new_count();
      document.getElementById("new-count").textContent =
        `${n} ${n === 1 ? "novo" : "novos"}`;
    } catch (e) {}
    try {
      const f = await a.filtered_count();
      let rc = 0;
      try { rc = await a.read_count(); } catch (e) {}
      const bits = [];
      if (f > 0) bits.push(`${f} ${f === 1 ? "vídeo filtrado" : "vídeos filtrados"} por não baterem com seus objetivos`);
      if (rc > 0) bits.push(`${rc} ${rc === 1 ? "lido" : "lidos"}`);
      document.getElementById("footer").textContent = bits.join(" · ");
    } catch (e) {}
  }

  // pywebview signals readiness via this event; also poll as fallback.
  function boot() { load(); checkUpdateSilent(); }
  window.addEventListener("pywebviewready", boot);
  let tries = 0;
  const poll = setInterval(() => {
    if (api() || tries++ > 40) { clearInterval(poll); boot(); }
  }, 100);
</script>
</body>
</html>
