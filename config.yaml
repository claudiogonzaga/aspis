# Clípeo — configuração
# Edite este arquivo. Segredos (chaves de API) vêm de variáveis de ambiente,
# nunca daqui. client_secret.json / token.json ficam fora do repositório.

pilares:
  saude:
    nome: "Saúde mental e física"
    descricao: "Saúde baseada em evidência: sono, treino de força, nutrição sustentável, ansiedade, foco."
    quero: ["protocolos acionáveis", "estudos", "hábitos sustentáveis"]
    nao_quero: ["dietas milagrosas", "biohacking sem evidência", "fitspiration"]
  investimento:
    nome: "Decisões acertadas em investimento"
    descricao: "Decisões de longo prazo, alocação, gestão de risco, sobriedade."
    quero: ["frameworks", "dados macro", "análise sóbria"]
    nao_quero: ["pump de cripto", "day-trade hype", "FOMO", "sinais de compra"]
  paternidade:
    nome: "Ser um bom pai"
    descricao: "Pai presente e melhor: desenvolvimento infantil, disciplina positiva, equilíbrio."
    quero: ["psicologia do desenvolvimento", "atividades", "comunicação"]
    nao_quero: ["culpa parental", "comparação", "prescrições rígidas"]

# Vídeos abaixo deste score ficam ocultos da lista (mas contam no rodapé).
score_threshold: 60

# Janela de busca da rotina (horas para trás a partir do last_run).
lookback_hours: 36

# Limite de vídeos novos considerados por canal por execução.
max_videos_per_channel: 8

llm:
  # Cérebro ATIVO. Troque para "anthropic" (e enabled: true abaixo) quando quiser.
  provider: gemini
  max_transcript_chars: 14000        # corta transcrições muito longas para conter custo
  providers:
    gemini:
      enabled: true
      model: "gemini-3.5-flash"      # string exata do modelo; editável
      api_key_env: GEMINI_API_KEY    # lido de variável de ambiente
      temperature: 0.3
    anthropic:
      enabled: false                 # pronto para ligar: mude para true e provider: anthropic
      model: "claude-3-5-haiku-latest"
      api_key_env: ANTHROPIC_API_KEY
      temperature: 0.3

youtube:
  # LOGIN agora é DENTRO DO APP (botão "Conta" → cola a credencial → Conectar).
  # Suporta vários canais; o canal ATIVO é escolhido no app. A credencial e os
  # tokens ficam em ~/.clipeo/oauth_client.json e ~/.clipeo/accounts/.
  #
  # Alternativa sem login (modo manual): liste channel_ids e use uma API key.
  # Se 'channels_manuais' estiver preenchido, ele tem prioridade sobre o login.
  channels_manuais: []               # ex.: ["UCxxxx", "UCyyyy"]
  api_key_env: YOUTUBE_API_KEY       # usado só no modo manual (sem login)

obsidian:
  vault_path: "~/Obsidian/MeuVault"
  daily_notes_folder: "Daily"

anki:
  enabled: true
  deck: "Clípeo"

download:
  folder: "~/Clipeo/Downloads"       # onde o app baixa os vídeos
  # Pasta observada pelo Syncthing/Drive para enviar ao Android. O botão
  # "Enviar p/ Android" copia o .mp4 para cá. Default: ~/Clipeo/ParaAndroid.
  android_folder: "~/Clipeo/ParaAndroid"

transcript:
  # Legendas via yt-dlp (json3/vtt, com impersonation curl_cffi); fallback
  # youtube-transcript-api. Se o YouTube bloquear por IP (HTTP 429) OU não houver
  # legenda, cai para o Whisper local (baixa o áudio e transcreve offline).
  whisper:
    enabled: false        # true = sempre usar Whisper (ignora legendas)
    auto_on_block: true   # usar Whisper automaticamente quando o YouTube bloquear (429)
    model: "base"         # tiny|base|small|medium|large
